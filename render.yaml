services:
  - type: web
    name: agentic-ai-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_WEB_SEARCH_MODEL
        value: gpt-4.1-mini
      - key: APIFY_TOKEN
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: SOFTPRODIGY_APIFY_ACTOR_ID
        value: GWVs761IEVnlW4SYp
      - key: SOFTPRODIGY_APIFY_TIMEOUT_SECONDS
        value: "120"

  - type: web
    runtime: static
    name: agentic-ai-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: agentic-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
